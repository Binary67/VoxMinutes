<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recording | AI Notes</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles/foundation.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/modal.css" />
    <link rel="stylesheet" href="styles/transcript-panel.css" />
    <link rel="stylesheet" href="styles/recording.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar scroll-fade" aria-label="Sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <i class="bi bi-soundwave"></i>
          </div>
          <div>
            <p class="brand-title">AI Notes</p>
            <p class="brand-subtitle">Pro Workspace</p>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Primary">
          <a href="dashboard.html" class="nav-item">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
          </a>
          <a href="meetings.html" class="nav-item">
            <i class="bi bi-camera-video"></i>
            <span>Meetings</span>
          </a>
          <button type="button" class="nav-item">
            <i class="bi bi-star"></i>
            <span>Favorites</span>
          </button>
        </nav>

        <section class="tags-section" aria-label="Tags">
          <p class="section-label">Tags</p>
          <ul id="tag-list" class="tag-list"></ul>
        </section>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-footer">
          <button type="button" class="settings-link">
            <i class="bi bi-gear"></i>
            <span>Settings</span>
          </button>
        </div>
      </aside>

      <main class="main-panel scroll-fade">
        <div class="panel-frame">
          <section
            id="recording-view"
            class="view-panel recording-view is-stopped"
            data-state="stopped"
          >
            <header class="recording-header">
              <h1 id="recording-title">New Recording</h1>
              <p id="recording-subtitle">Prepare your mic and press Start when ready.</p>
            </header>

            <section class="recording-status-row" aria-live="polite">
              <p class="recording-status-inline">
                <span id="recording-live-dot" class="live-dot" aria-hidden="true"></span>
                <span id="recording-status-text-inline" class="recording-status-text-inline">Ready</span>
                <span id="tiny-signal-meter" class="tiny-signal-meter" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </p>
              <button
                id="mic-toggle-btn"
                type="button"
                class="icon-control recording-mic-control"
                aria-label="Mute microphone"
                aria-pressed="false"
              >
                <i class="bi bi-mic-fill"></i>
              </button>
            </section>

            <section class="timer-section" aria-label="Recording timer">
              <p class="timer-readout">
                <span id="timer-hours" class="timer-part">00</span>
                <span class="timer-separator">:</span>
                <span id="timer-minutes" class="timer-part">00</span>
                <span class="timer-separator">:</span>
                <span id="timer-seconds" class="timer-part">00</span>
              </p>
              <div class="timer-units">
                <span>HRS</span>
                <span>MIN</span>
                <span>SEC</span>
              </div>
            </section>

            <section class="recording-controls" aria-label="Recording controls">
              <button id="start-recording-btn" type="button" class="action-control primary">
                <i class="bi bi-record-circle"></i>
                <span>Start</span>
              </button>
              <button
                id="stop-recording-btn"
                type="button"
                class="action-control danger is-compact"
                hidden
                disabled
              >
                <i class="bi bi-stop-circle"></i>
                <span>Stop</span>
              </button>
            </section>

            <section class="transcript-section">
              <div class="transcript-header">
                <p class="transcript-title">
                  <i class="bi bi-card-text"></i>
                  <span>Transcription</span>
                </p>
                <button type="button" class="language-chip">English (US)</button>
              </div>

              <div
                id="transcript-feed"
                class="transcript-feed scroll-fade"
                aria-live="polite"
              ></div>
            </section>
          </section>
        </div>
      </main>
    </div>

    <div id="rename-speaker-modal-backdrop" class="modal-backdrop" hidden>
      <section
        id="rename-speaker-modal"
        class="meeting-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="rename-speaker-modal-title"
        aria-describedby="rename-speaker-modal-description"
      >
        <header class="meeting-modal-header">
          <h2 id="rename-speaker-modal-title">Rename Speaker</h2>
          <p id="rename-speaker-modal-description">
            Update how this speaker appears in the transcript.
          </p>
        </header>

        <form id="rename-speaker-form" class="meeting-modal-form">
          <label class="meeting-modal-field">
            <span>Speaker name</span>
            <input id="rename-speaker-input" name="speakerName" type="text" maxlength="120" required />
          </label>

          <p id="rename-speaker-error" class="modal-error" hidden></p>

          <div class="meeting-modal-actions">
            <button id="rename-speaker-cancel-btn" type="button" class="modal-btn secondary">
              Cancel
            </button>
            <button id="rename-speaker-submit-btn" type="submit" class="modal-btn primary">
              Save
            </button>
          </div>
        </form>
      </section>
    </div>

    <script src="ui-shared.js"></script>
    <script src="transcript-renderer.js"></script>
    <script src="recording-ui.js"></script>
    <script src="recording-media.js"></script>
    <script src="recording-speaker-rename.js"></script>
    <script src="recording.js"></script>
  </body>
</html>
