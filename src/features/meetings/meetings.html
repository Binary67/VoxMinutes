<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meetings | AI Notes</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../../styles/base/foundation.css" />
    <link rel="stylesheet" href="../../styles/base/layout.css" />
    <link rel="stylesheet" href="../../styles/pages/dashboard.css" />
    <link rel="stylesheet" href="../../styles/pages/meetings.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar scroll-fade" aria-label="Sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <i class="bi bi-soundwave"></i>
          </div>
          <div>
            <p class="brand-title">AI Notes</p>
            <p class="brand-subtitle">Pro Workspace</p>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Primary">
          <a href="../dashboard/dashboard.html" class="nav-item">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
          </a>
          <a href="meetings.html" class="nav-item is-active" aria-current="page">
            <i class="bi bi-camera-video"></i>
            <span>Meetings</span>
          </a>
          <button type="button" class="nav-item">
            <i class="bi bi-star"></i>
            <span>Favorites</span>
          </button>
        </nav>

        <section class="tags-section" aria-label="Tags">
          <p class="section-label">Tags</p>
          <ul id="tag-list" class="tag-list"></ul>
        </section>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-footer">
          <button type="button" class="settings-link">
            <i class="bi bi-gear"></i>
            <span>Settings</span>
          </button>
        </div>
      </aside>

      <main class="main-panel scroll-fade">
        <div class="panel-frame">
          <section class="view-panel meetings-view">
            <header class="page-header">
              <div>
                <h1>Meetings</h1>
                <p>Open past recordings and review complete meeting transcripts.</p>
              </div>

              <label class="search-box">
                <i class="bi bi-search" aria-hidden="true"></i>
                <input
                  id="meetings-search-input"
                  type="search"
                  placeholder="Search meetings..."
                  aria-label="Search meetings"
                />
              </label>
            </header>

            <section class="meetings-list-section" aria-label="Meetings list">
              <div class="meetings-list-head">
                <p class="meetings-count"><span id="meetings-count-value">0</span> meetings</p>
              </div>

              <div id="meetings-list" class="meetings-list"></div>
              <p id="meetings-empty-state" class="empty-state" hidden>
                No meetings match your search.
              </p>
            </section>
          </section>
        </div>
      </main>
    </div>

    <script src="../../shared/constants/input-modes.js"></script>
    <script src="../../shared/ui/formatters.js"></script>
    <script src="../../shared/ui/navigation.js"></script>
    <script src="../../shared/ui/dom.js"></script>
    <script src="../../shared/ui/scroll.js"></script>
    <script src="../../shared/ui/index.js"></script>
    <script src="index.js"></script>
  </body>
</html>
